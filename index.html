<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柒樂部 | 日系簡約縮網址</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #faf9f6; overflow-x: hidden; }
        .macaron-blob { position: absolute; filter: blur(80px); z-index: -1; opacity: 0.6; animation: float 10s ease-in-out infinite; }
        .blob-pink { background-color: #ffb3ba; width: 300px; height: 300px; top: -50px; left: -50px; }
        .blob-blue { background-color: #bae1ff; width: 250px; height: 250px; bottom: 10%; right: -20px; animation-delay: 2s; }
        .blob-yellow { background-color: #ffffba; width: 200px; height: 200px; top: 40%; left: 20%; animation-delay: 4s; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .btn-macaron { background: linear-gradient(135deg, #baffc9 0%, #bae1ff 100%); transition: all 0.3s ease; }
        .fade-in { animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative px-4 text-gray-700">

    <div class="macaron-blob blob-pink"></div>
    <div class="macaron-blob blob-blue"></div>
    <div class="macaron-blob blob-yellow"></div>

    <!-- 1. 產生器 UI (預設顯示) -->
    <main id="generatorUI" class="bg-white/80 backdrop-blur-xl w-full max-w-lg rounded-[2.5rem] p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/50 relative z-10 hidden">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-widest text-gray-800 mb-3">柒樂部</h1>
            <p class="text-sm text-gray-500 tracking-wider">將繁雜的軌跡，化作簡約的印記。</p>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-600 ml-1">原始長網址</label>
                <input type="url" id="longUrl" placeholder="https://..." class="w-full px-5 py-4 rounded-2xl bg-gray-50/50 border border-gray-100 outline-none focus:ring-4 focus:ring-[#bae1ff]/20 transition-all">
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-600 ml-1">自訂後綴 (選填)</label>
                <input type="text" id="customTag" placeholder="my-link" class="w-full px-5 py-4 rounded-2xl bg-gray-50/50 border border-gray-100 outline-none focus:ring-4 focus:ring-[#baffc9]/20 transition-all">
            </div>

            <p id="errorMsg" class="hidden text-red-400 text-sm ml-1"></p>

            <button id="submitBtn" class="btn-macaron w-full py-4 rounded-2xl text-gray-700 font-medium tracking-widest flex justify-center items-center gap-2">
                <span id="btnText">產生簡約網址</span>
            </button>
        </div>

        <div id="resultArea" class="hidden mt-8 pt-8 border-t border-gray-100 fade-in">
            <p class="text-sm font-medium text-gray-600 mb-3 ml-1">生成的簡約網址 ✨</p>
            <div class="flex items-center gap-2 bg-[#faf9f6] p-2 rounded-2xl border border-gray-100">
                <input type="text" id="shortUrl" readonly class="w-full bg-transparent border-none outline-none text-gray-700 px-3 text-sm">
                <button id="copyBtn" class="bg-white px-5 py-2.5 rounded-xl text-sm font-medium shadow-sm border border-gray-100">複製</button>
            </div>
        </div>
    </main>

    <!-- 2. 導轉中 UI (有 ID 參數時顯示) -->
    <div id="redirectUI" class="text-center z-10 hidden fade-in">
        <div class="mb-6 relative inline-block">
             <div class="animate-ping absolute inset-0 rounded-full bg-[#bae1ff] opacity-20"></div>
             <div class="bg-white p-6 rounded-full shadow-sm relative">
                <svg class="w-12 h-12 text-[#bae1ff] animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
             </div>
        </div>
        <h2 class="text-xl font-medium tracking-widest text-gray-800">正在前往目的地</h2>
        <p class="text-sm text-gray-400 mt-2">請稍候，柒樂部正在為您導航...</p>
    </div>

    <script>
        // 使用者提供的 GAS 網址
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzux6h7rNY0MyzcGm3gCLs_m9Zw7JgYisjynJRufPDwsTMlnERizBzEw8WmyplLUeQKjQ/exec";
        const BASE_DOMAIN = window.location.origin + window.location.pathname;

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id) {
                // --- 導轉模式 ---
                document.getElementById('redirectUI').classList.remove('hidden');
                try {
                    // 使用 GET 請求查詢對應的長網址
                    const response = await fetch(`${GAS_API_URL}?id=${id}`);
                    const result = await response.json();
                    if (result.status === "success" && result.url) {
                        window.location.replace(result.url);
                    } else {
                        document.body.innerHTML = `
                            <div class="text-center z-10">
                                <h1 class="text-4xl font-bold text-gray-800 mb-4">404</h1>
                                <p class="text-gray-500 mb-6">哎呀！此連結已失效或不存在。</p>
                                <a href="${BASE_DOMAIN}" class="btn-macaron px-8 py-3 rounded-xl text-gray-700 font-medium inline-block">返回首頁</a>
                            </div>`;
                    }
                } catch (e) {
                    console.error("Redirect error:", e);
                    document.body.innerHTML = `<div class="text-center z-10"><p class="text-gray-500">跳轉服務暫時不可用，請稍後再試。</p></div>`;
                }
            } else {
                // --- 產生器模式 ---
                document.getElementById('generatorUI').classList.remove('hidden');
            }
        };

        // 產生按鈕邏輯
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.addEventListener('click', async () => {
            const longUrl = document.getElementById('longUrl').value.trim();
            const tag = document.getElementById('customTag').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if (!longUrl) {
                errorMsg.textContent = "請輸入原始網址";
                errorMsg.classList.remove('hidden');
                return;
            }

            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;
            document.getElementById('btnText').textContent = "處理中...";

            try {
                const params = new URLSearchParams();
                params.append('url', longUrl);
                params.append('tag', tag);

                const response = await fetch(GAS_API_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params 
                });
                const result = await response.json();

                if (result.status === "success") {
                    const finalUrl = `${BASE_DOMAIN}?id=${result.tag}`;
                    document.getElementById('shortUrl').value = finalUrl;
                    document.getElementById('resultArea').classList.remove('hidden');
                } else {
                    errorMsg.textContent = result.message || "發生錯誤";
                    errorMsg.classList.remove('hidden');
                }
            } catch (e) {
                errorMsg.textContent = "無法連線至 API，請確認 GAS 權限設定。";
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                document.getElementById('btnText').textContent = "產生簡約網址";
            }
        });

        // 複製功能
        document.getElementById('copyBtn').addEventListener('click', function() {
            const input = document.getElementById('shortUrl');
            input.select();
            input.setSelectionRange(0, 99999);
            try {
                document.execCommand('copy');
                this.textContent = "已複製";
                this.classList.add('text-green-500');
                setTimeout(() => { 
                    this.textContent = "複製"; 
                    this.classList.remove('text-green-500');
                }, 2000);
            } catch (err) {
                console.error('Copy failed');
            }
        });
    </script>
</body>
</html>
