<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkCut. | Url Shortener Magazine</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts (Noto Serif JP/TC) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <!-- 引入 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Noto Serif JP', 'Noto Serif TC', serif;
            background-color: #faf9f6;
            color: #4a4a4a;
            -webkit-font-smoothing: antialiased;
        }
        .letter-spacing-wide {
            letter-spacing: 0.2em;
        }
        .letter-spacing-extra-wide {
            letter-spacing: 0.4em;
        }
        .selection-bg::selection {
            background-color: #e0e5df;
        }
        /* 隱藏預設捲軸 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #faf9f6;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d1d1;
            border-radius: 10px;
        }
        /* 動畫 */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="selection-bg">

    <!-- 轉址跳轉畫面 (預設隱藏) -->
    <div id="redirect-screen" class="fixed inset-0 bg-[#faf9f6] z-50 hidden flex flex-col items-center justify-center p-4 text-center">
        <div class="mb-6">
            <i data-lucide="loader-2" class="w-10 h-10 text-[#7a8a7c] animate-spin-custom"></i>
        </div>
        <h1 class="text-xl tracking-[0.2em] text-[#4a4a4a] mb-2 font-medium">目的地へ移動中</h1>
        <p class="text-sm text-[#8c8c8c] tracking-wider italic">Connecting to the destination...</p>
    </div>

    <!-- 主程式介面 -->
    <div id="app-content">
        <div class="h-1.5 w-full bg-[#7a8a7c]"></div>

        <header class="pt-12 pb-10 px-6 border-b border-[#e5e5e5] mb-12">
            <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-end justify-between gap-6">
                <div class="flex flex-col items-start">
                    <span class="text-[10px] tracking-[0.4em] text-[#b0b0b0] uppercase mb-3 font-bold">The Art of Connection</span>
                    <h1 class="text-4xl font-bold tracking-[0.1em] text-[#333] flex items-center gap-2">
                        LinkCut<span class="text-[#7a8a7c]">.</span>
                    </h1>
                </div>
                <div class="text-right hidden md:block border-l border-[#eee] pl-6">
                    <p class="text-[10px] text-[#8c8c8c] tracking-[0.15em] leading-relaxed uppercase">
                        Current Domain:<br/>
                        <span id="display-domain-text" class="text-[#333] font-bold">a7club.life</span>
                    </p>
                </div>
            </div>
        </header>

        <main class="max-w-5xl mx-auto px-6 pb-20">
            <div class="grid lg:grid-cols-12 gap-16 items-start">
                
                <!-- 左側：表單區塊 -->
                <div class="lg:col-span-5 space-y-12">
                    <section>
                        <div class="flex items-center gap-2 mb-10">
                            <i data-lucide="pen-tool" class="w-4 h-4 text-[#7a8a7c]"></i>
                            <h2 class="text-xs tracking-[0.3em] text-[#4a4a4a] uppercase font-bold">New Archive</h2>
                        </div>

                        <form id="shorten-form" class="space-y-10">
                            <div class="space-y-4">
                                <label class="block text-[11px] font-bold tracking-[0.2em] text-[#8c8c8c] uppercase">Target URL</label>
                                <div class="relative group">
                                    <input type="url" id="longUrl" required
                                        class="w-full bg-transparent border-b border-[#d1d1d1] pb-3 text-sm focus:outline-none focus:border-[#7a8a7c] transition-all placeholder:text-[#e0e0e0]"
                                        placeholder="https://example.com/long-url">
                                </div>
                            </div>

                            <div class="space-y-4">
                                <label class="block text-[11px] font-bold tracking-[0.2em] text-[#8c8c8c] uppercase">Custom Slashtag</label>
                                <div class="flex items-end border-b border-[#d1d1d1] focus-within:border-[#7a8a7c] transition-all pb-3">
                                    <span id="input-prefix" class="text-xs text-[#b0b0b0] pr-1 tracking-tight">a7club.life/?s=</span>
                                    <input type="text" id="slashTag"
                                        class="flex-1 bg-transparent text-sm focus:outline-none placeholder:text-[#e0e0e0]"
                                        placeholder="my-tag">
                                </div>
                            </div>

                            <div id="error-message" class="bg-[#fffafa] border border-[#f5e6e6] text-[#c94c4c] px-4 py-4 text-xs tracking-wider hidden items-start gap-3">
                                <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
                                <span id="error-text" class="leading-relaxed"></span>
                            </div>

                            <button type="submit" id="submit-btn"
                                class="group relative w-full bg-[#333] hover:bg-[#4a4a4a] text-[#faf9f6] text-[11px] tracking-[0.3em] uppercase py-5 transition-all flex items-center justify-center gap-3 overflow-hidden shadow-sm active:translate-y-px">
                                <span id="btn-icon"><i data-lucide="sparkles" class="w-4 h-4"></i></span>
                                <span id="btn-text">Generate Link</span>
                            </button>
                        </form>
                    </section>

                    <section class="bg-[#f2f1ed] p-8 border border-[#e5e5e2]">
                        <div class="flex items-center gap-2 mb-4">
                            <i data-lucide="settings" class="w-3.5 h-3.5 text-[#7a8a7c]"></i>
                            <h3 class="text-xs font-bold tracking-[0.2em] text-[#4a4a4a] uppercase">Studio Note</h3>
                        </div>
                        <p class="text-[11px] text-[#7a7a7a] leading-loose tracking-wider">
                            目前的顯示網域設定為 <span class="font-bold text-[#333] display-domain-span">a7club.life</span>。<br>
                            生成的網址會以此網域展示，但功能會依據目前的實際網址運作。
                        </p>
                    </section>
                </div>

                <!-- 右側：列表區塊 -->
                <div class="lg:col-span-7">
                    <div class="flex items-center justify-between mb-10 pb-4 border-b border-[#333]">
                        <div class="flex items-center gap-3">
                            <i data-lucide="book-open" class="w-5 h-5 text-[#333]"></i>
                            <h2 class="text-xs tracking-[0.3em] text-[#333] uppercase font-bold">Collection</h2>
                        </div>
                        <span id="total-count" class="text-[11px] font-bold text-[#b0b0b0] bg-[#eee] px-2 py-0.5 rounded">0</span>
                    </div>
                    
                    <div id="loading-state" class="py-32 flex flex-col items-center justify-center text-[#b0b0b0]">
                        <i data-lucide="loader-2" class="w-8 h-8 animate-spin-custom mb-4 opacity-30"></i>
                        <span class="text-[10px] tracking-[0.3em] uppercase">Fetching archives...</span>
                    </div>

                    <div id="empty-state" class="border border-dashed border-[#d1d1d1] py-32 hidden flex flex-col items-center justify-center text-[#b0b0b0] bg-[#fdfcfb]/50">
                        <i data-lucide="hash" class="w-8 h-8 mb-4 opacity-20"></i>
                        <span class="text-[10px] tracking-[0.3em] uppercase">No archives yet</span>
                    </div>

                    <div id="links-list" class="divide-y divide-[#eee]">
                        <!-- 動態插入連結項目 -->
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-20 pt-12 pb-16 border-t border-[#e5e5e5] px-6">
            <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-[10px] tracking-[0.2em] text-[#b0b0b0] uppercase font-bold">
                    Minimalist Shortener System
                </div>
                <div class="flex gap-8">
                    <span class="text-[10px] text-[#b0b0b0] uppercase tracking-widest border-b border-[#ddd] pb-1 cursor-pointer">Archive</span>
                    <span class="text-[10px] text-[#b0b0b0] uppercase tracking-widest border-b border-[#ddd] pb-1 cursor-pointer">Stats</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- JavaScript 邏輯 -->
    <script>
        // --- 設定區 ---
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzux6h7rNY0MyzcGm3gCLs_m9Zw7JgYisjynJRufPDwsTMlnERizBzEw8WmyplLUeQKjQ/exec';
        const DISPLAY_DOMAIN = 'a7club.life'; // 顯示用的精簡網域

        // --- 全域變數 ---
        let links = [];
        const currentPath = window.location.origin + window.location.pathname;

        // --- 初始化 ---
        window.onload = function() {
            lucide.createIcons();
            document.querySelectorAll('.display-domain-span').forEach(el => el.innerText = DISPLAY_DOMAIN);
            document.getElementById('display-domain-text').innerText = DISPLAY_DOMAIN;
            document.getElementById('input-prefix').innerText = DISPLAY_DOMAIN + '/?s=';

            checkRedirection();
        };

        // --- 檢查轉址 ---
        async function checkRedirection() {
            const params = new URLSearchParams(window.location.search);
            const tag = params.get('s');
            
            if (tag) {
                document.getElementById('redirect-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
                
                try {
                    const response = await fetch(GAS_API_URL);
                    const data = await response.json();
                    const target = data.find(l => l.tag === tag);
                    
                    if (target) {
                        // 紀錄點擊
                        fetch(GAS_API_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify({ action: 'click', tag: tag })
                        });
                        // 跳轉
                        window.location.replace(target.originalUrl);
                    } else {
                        showError('指定されたリンクは存在しません (找不到該連結)。');
                        initMainApp();
                    }
                } catch (err) {
                    showError('連線資料庫失敗。');
                    initMainApp();
                }
            } else {
                initMainApp();
            }
        }

        function initMainApp() {
            document.getElementById('redirect-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            fetchLinks();
        }

        // --- 抓取資料 ---
        async function fetchLinks() {
            try {
                const response = await fetch(GAS_API_URL);
                links = await response.json();
                renderLinks();
            } catch (err) {
                console.error('Fetch failed', err);
            } finally {
                document.getElementById('loading-state').classList.add('hidden');
            }
        }

        // --- 渲染列表 ---
        function renderLinks() {
            const listEl = document.getElementById('links-list');
            const emptyEl = document.getElementById('empty-state');
            const totalEl = document.getElementById('total-count');

            listEl.innerHTML = '';
            totalEl.innerText = links.length;

            if (links.length === 0) {
                emptyEl.classList.remove('hidden');
                return;
            }

            emptyEl.classList.add('hidden');

            links.forEach((link, index) => {
                const item = document.createElement('div');
                item.className = 'py-8 first:pt-0 group';
                
                // 漂亮顯示網址與真實跳轉網址
                const displayUrl = `${DISPLAY_DOMAIN}/?s=${link.tag}`;
                const realUrl = `${currentPath}?s=${link.tag}`;

                item.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-6 justify-between">
                        <div class="flex-1 min-w-0 space-y-3">
                            <div class="flex items-center gap-3">
                                <span class="text-[10px] font-bold text-[#7a8a7c] bg-[#eef2ef] px-1.5 py-0.5 rounded-sm">${link.tag}</span>
                                <span class="text-[10px] text-[#ccc] font-sans">${link.createdAt.split(' ')[0]}</span>
                            </div>
                            <div class="flex flex-col space-y-1">
                                <a href="${realUrl}" class="short-link-a text-xl text-[#333] hover:text-[#7a8a7c] transition-colors tracking-tight font-sans font-medium break-all" data-id="${link.id}" data-url="${link.originalUrl}" data-tag="${link.tag}">
                                    ${displayUrl}
                                </a>
                                <div class="flex items-center gap-2 text-[10px] text-[#a0a0a0] font-sans truncate">
                                    <i data-lucide="arrow-right" class="w-2.5 h-2.5 text-[#d1d1d1]"></i>
                                    <span class="truncate italic">${link.originalUrl}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-8 md:gap-6 self-end md:self-center">
                            <div class="text-right">
                                <p class="text-[9px] tracking-[0.2em] text-[#b0b0b0] uppercase mb-0.5 font-bold">Hits</p>
                                <p class="text-lg font-sans font-light text-[#555]">${link.clicks}</p>
                            </div>
                            <div class="flex items-center gap-1">
                                <button class="copy-btn p-3 rounded-full text-[#8c8c8c] hover:bg-white hover:text-[#333] transition-all" data-url="${displayUrl}">
                                    <i data-lucide="copy" class="w-[18px] h-[18px]"></i>
                                </button>
                                <button class="visit-btn p-3 text-[#8c8c8c] hover:bg-white hover:text-[#333] rounded-full transition-all" data-id="${link.id}" data-url="${link.originalUrl}" data-tag="${link.tag}">
                                    <i data-lucide="external-link" class="w-[18px] h-[18px]"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                listEl.appendChild(item);
            });

            lucide.createIcons();
            attachListEvents();
        }

        // --- 表單送出 ---
        document.getElementById('shorten-form').onsubmit = async function(e) {
            e.preventDefault();
            hideError();

            const longUrl = document.getElementById('longUrl').value;
            const slashTagInput = document.getElementById('slashTag').value.trim();
            const finalTag = slashTagInput || Math.random().toString(36).substring(2, 8);

            // 驗證
            if (links
